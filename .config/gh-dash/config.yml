# yaml-language-server: $schema=https://gh-dash.dev/schema.json
prSections:
  - title: Needs My Review
    filters: is:open review-requested:@me
  - title: My Pull Requests
    filters: is:open author:@me
  - title: Involved
    filters: is:open involves:@me -author:@me
issuesSections:
  - title: My Issues
    filters: is:open author:@me
  - title: Assigned
    filters: is:open assignee:@me
  - title: Involved
    filters: is:open involves:@me -author:@me
defaults:
  preview:
    open: true
    width: 50
  prsLimit: 20
  issuesLimit: 20
  view: prs
  layout:
    prs:
      updatedAt:
        width: 7
      repo:
        width: 15
      author:
        width: 15
      assignees:
        width: 20
        hidden: true
      base:
        width: 15
        hidden: true
      lines:
        width: 16
    issues:
      updatedAt:
        width: 7
      repo:
        width: 15
      creator:
        width: 10
      assignees:
        width: 20
        hidden: true
  refetchIntervalMinutes: 30
keybindings:
  issues: []
  prs:
    - key: enter
      command: >
        tmux new-window -n "pr-{{.PrNumber}}" -c {{.RepoPath}} '
        nvim -c ":Octo pr edit {{.PrNumber}}"
        '
    - key: d
      command: >
        tmux new-window -n "diff-{{.PrNumber}}" -c {{.RepoPath}} '
        gh pr diff {{.PrNumber}} --repo {{.RepoName}} | delta --paging=always
        '
    - key: C
      command: >
        tmux new-window -n "claude-{{.PrNumber}}" -c {{.RepoPath}} '
        gh pr diff {{.PrNumber}} --repo {{.RepoName}} > /tmp/pr-review-{{.PrNumber}}.md &&
        echo "# PR #{{.PrNumber}} - {{.RepoName}}" | cat - /tmp/pr-review-{{.PrNumber}}.md > /tmp/pr-review-{{.PrNumber}}-full.md &&
        mv /tmp/pr-review-{{.PrNumber}}-full.md /tmp/pr-review-{{.PrNumber}}.md &&
        nvim /tmp/pr-review-{{.PrNumber}}.md
        '
    - key: c
      name: Comment
      command: >
        gh pr review --repo {{.RepoName}} --comment
        --body "$(gum write --placeholder='Leave a comment...')"
        {{.PrNumber}}
    - key: x
      name: Request changes
      command: >
        gh pr review --repo {{.RepoName}} --request-changes
        --body "$(gum write --placeholder='Describe requested changes...')"
        {{.PrNumber}}
    - key: U
      name: Remove me as reviewer
      command: >
        gh api -X DELETE "repos/{{.RepoName}}/pulls/{{.PrNumber}}/requested_reviewers"
        -f 'reviewers[]=MrAustin2u' --silent
    - key: b
      command: >
        gh pr view {{.PrNumber}} --repo {{.RepoName}} --web
repoPaths:
  Boulevard/sched: ~/BLVD/sched
  Boulevard/*: ~/BLVD/*
theme:
  ui:
    table:
      showSeparator: true
pager:
  diff: delta
